<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Stack · Kaipability</title>
  <meta name="description" content="A curated directory of free and freemium software for small business. No affiliate links, no sponsored placements. Every tool comes with alternatives and training resources.">

  <!-- Social preview (PRD section 7, item 1 batch A): aimed at the client-mode
       reader, since that is the link that actually gets shared. Placed before
       the stylesheet, Slack only reads the first 32KB of the document. -->
  <meta property="og:title" content="Your Free Software Stack">
  <meta property="og:description" content="Curated free software for small business, prepared by Kaipability. Every tool with alternatives and training resources.">
  <meta property="og:url" content="https://kai-freestack.netlify.app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Free Stack by Kaipability">
  <meta property="og:image" content="https://kai-freestack.netlify.app/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://kai-freestack.netlify.app/">

  <link rel="icon" type="image/png" href="design-system/assets/kaipability-mark.png">

  <!-- No-flash-of-wrong-theme: stored choice wins, otherwise OS preference.
       Runs before the stylesheet loads so the first paint is already correct. -->
  <script>
    try {
      var t = localStorage.getItem('freestack:v1:theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <noscript>
    <div class="app-message">Free Stack needs JavaScript to render the tool directory. Please enable it and reload.</div>
  </noscript>

  <div id="loading" class="app-message" aria-live="polite">Loading the directory…</div>

  <main id="curator-root" hidden></main>
  <main id="client-root" hidden></main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="js/data-loader.js"></script>
</body>
</html>
