# CI gate: the same two checks BUILD-LOOP requires before any push.
# Netlify deploys every push to main, so main must never receive a commit
# that has not passed these. Playwright is installed here only; the site
# itself keeps zero npm dependencies.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate tools.json against PRD section 4
        run: node scripts/validate-data.mjs

      - name: Install Playwright (dev-time only, not a site dependency)
        run: |
          mkdir -p "$RUNNER_TEMP/pw"
          cd "$RUNNER_TEMP/pw"
          npm init -y > /dev/null
          npm install playwright > /dev/null
          npx playwright install --with-deps chromium

      - name: Browser smoke test (DoD 1-8)
        run: PLAYWRIGHT_DIR="$RUNNER_TEMP/pw" node scripts/smoke-test.mjs
